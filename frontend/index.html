<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ──────────────── RESET & TOKENS ──────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #10101a;
      --panel:     #14141f;
      --border:    #1e1e30;
      --accent:    #00ffc8;
      --accent2:   #7b61ff;
      --warn:      #ff5f5f;
      --muted:     #3a3a55;
      --text:      #e0e0f0;
      --text-dim:  #6060a0;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Syne', sans-serif;
      --radius:    6px;
      --glow:      0 0 20px rgba(0,255,200,0.15);
      --glow-sm:   0 0 8px rgba(0,255,200,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ──────────────── LOBBY ──────────────── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      padding: 2rem;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(123,97,255,.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(0,255,200,.05) 0%, transparent 60%),
        var(--bg);
    }

    .lobby-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .lobby-header h1 {
      font-family: var(--font-sans);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lobby-header p {
      color: var(--text-dim);
      margin-top: 0.75rem;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lobby-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 0 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: var(--glow-sm);
    }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.7rem 1.2rem;
      transition: all .2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: var(--glow); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--warn);
      color: var(--warn);
    }
    .btn-danger:hover { background: rgba(255,95,95,.1); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-muted {
      background: var(--muted);
      color: var(--warn);
    }
    .btn-muted:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ──────────────── ROOM ──────────────── */
    #room { display: none; height: 100vh; flex-direction: column; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .room-badge {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 14px;
      color: var(--accent);
    }

    .room-badge span {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 12px;
    }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: .5rem; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--warn);
      transition: background .3s;
    }
    .status-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    /* ──────────────── MAIN LAYOUT ──────────────── */
    .room-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ──────────────── SIDEBAR ──────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }

    /* Audio controls */
    .audio-controls { display: flex; flex-direction: column; gap: 0.5rem; }

    #btn-mute {
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #btn-mute::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
      transform: translateX(-100%);
    }
    #btn-mute.active::after { animation: shimmer 2s infinite; }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    .volume-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .volume-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width .05s;
    }

    /* Members list */
    #members-list { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; overflow-y: auto; padding: 1rem; }

    .member-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.6rem;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid transparent;
      transition: border-color .2s;
      animation: fadeIn .3s ease;
    }
    .member-item.speaking { border-color: var(--accent); box-shadow: var(--glow-sm); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    .member-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #000;
      flex-shrink: 0;
    }

    .member-name { font-size: 12px; color: var(--text); flex: 1; }
    .member-you  { font-size: 9px; color: var(--text-dim); }

    .peer-audio-indicator {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      transition: background .2s;
      flex-shrink: 0;
    }
    .peer-audio-indicator.active { background: var(--accent); box-shadow: 0 0 4px var(--accent); }

    /* ──────────────── CHAT PANEL ──────────────── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: msgIn .2s ease;
    }
    .msg.own { align-self: flex-end; align-items: flex-end; }
    .msg.system { align-self: center; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-bubble {
      padding: 0.55rem 0.9rem;
      border-radius: 8px;
      font-size: 12.5px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg:not(.own):not(.system) .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }
    .msg.own .msg-bubble {
      background: rgba(0,255,200,.12);
      border: 1px solid rgba(0,255,200,.25);
      border-bottom-right-radius: 2px;
      color: var(--accent);
    }
    .msg.system .msg-bubble {
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      padding: 0.3rem 0.6rem;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 0.2rem;
      padding: 0 0.25rem;
    }

    .chat-input-area {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
    }

    /* ──────────────── MODAL / OVERLAY ──────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .modal h3 { font-family: var(--font-sans); margin-bottom: .5rem; color: var(--warn); }
    .modal p { color: var(--text-dim); font-size: 12px; line-height: 1.6; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .5rem; justify-content: center; }

    /* ──────────────── SCROLLBAR (Firefox) ──────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
  </style>
</head>
<body>

<!-- ───────── LOBBY ───────── -->
<div id="lobby">
  <div class="lobby-header">
    <h1>VoiceChat</h1>
    <p>Real-time voice &amp; text rooms</p>
  </div>
  <div class="lobby-card">
    <div>
      <label class="field-label" for="input-name">Your name</label>
      <input type="text" id="input-name" placeholder="anonymous" maxlength="24" />
    </div>
    <div>
      <label class="field-label" for="input-room">Room</label>
      <input type="text" id="input-room" placeholder="general" maxlength="32" />
    </div>
    <button class="btn btn-primary" id="btn-join">Join room →</button>
  </div>
</div>

<!-- ───────── ROOM ───────── -->
<div id="room">
  <div class="topbar">
    <div class="room-badge" id="room-label"><span>room /</span> —</div>
    <div class="topbar-right">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text" style="font-size:11px;color:var(--text-dim)">disconnected</span>
      <button class="btn btn-danger" id="btn-leave" style="padding:.45rem .9rem;font-size:11px;">Leave</button>
    </div>
  </div>

  <div class="room-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">🎙 Audio</div>
        <div class="audio-controls">
          <button class="btn btn-primary" id="btn-mute">🎙 Muted</button>
          <div style="display:flex;align-items:center;gap:.5rem;padding:0 .1rem;">
            <span style="font-size:10px;color:var(--text-dim)">mic</span>
            <div class="volume-bar" style="flex:1">
              <div class="volume-fill" id="volume-fill"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:none;">
        <div class="sidebar-title">👥 In room (<span id="member-count">0</span>)</div>
        <div id="members-list"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-panel">
      <div id="messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Message…" maxlength="500" />
        <button class="btn btn-primary" id="btn-send">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Mic permission modal -->
<div class="modal-overlay" id="mic-modal">
  <div class="modal">
    <h3>Microphone access</h3>
    <p>VoiceChat needs microphone access to join audio calls. You can still use text chat if you deny.</p>
    <div class="modal-actions">
      <button class="btn btn-primary" id="mic-allow">Allow mic</button>
      <button class="btn btn-ghost" id="mic-deny">Text only</button>
    </div>
  </div>
</div>

<!-- Hidden audio elements container -->
<div id="audio-outputs" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
